spring.application.name=url-shortener-sb

spring.datasource.url=${DATABASE_URL}
spring.datasource.username=${DATABASE_USERNAME}
spring.datasource.password=${DATABASE_PASSWORD}
spring.jpa.hibernate.ddl-auto=update
#spring.jpa.show-sql=true
spring.jpa.properties.hibernate.dialect=${DATABASE_DIALECT}


jwt.secret=ThisIsAnUltraSecureJWTSecretKeyThatIsDefinitelyMoreThanThirtyTwoCharactersLong123456789
jwt.expiration=86400000


logging.level.org.springframework.security=DEBUG
logging.level.org.url.shortener=DEBUG
logging.level.org.springframework.web=DEBUG
logging.level.org.springframework=DEBUG
logging.level.org.springframework.web.servlet=TRACE

frontend.url=${FRONTEND_URL}
# frontend.url=${FRONTEND_URL:http://localhost:5173}


# ? Added for detailed error debugging
server.error.include-message=always
server.error.include-binding-errors=always